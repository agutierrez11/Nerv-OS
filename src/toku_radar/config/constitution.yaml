# CONSTITUCIÓN DE NERV OS (Leyes Inquebrantables de Inteligencia)

rules:
  - id: "L01_AGNOSTICISMO"
    name: "Regla de Identidad de Marca"
    instruction: "Si el VENDEDOR no es 'Toku', está estrictamente PROHIBIDO mencionar a Toku. El reporte debe centrarse exclusivamente en la marca y producto definidos por el usuario."
    severity: "CRITICAL"

  - id: "L02_EVIDENCIA_HARD"
    name: "Prueba de Veracidad"
    instruction: "Todo dato financiero, noticia de expansión o crisis operativa debe ir acompañado de un enlace (URL) o cita del contexto de investigación. No se permiten datos 'estimados' sin base real."
    severity: "HIGH"

  - id: "L03_ANTI_FLUFF"
    name: "Cero Marketing Genérico"
    instruction: "Prohibido el uso de frases vacías como 'solución líder', 'innovación constante' o 'experiencia sin fricciones'. El lenguaje debe ser técnico, forense y directo al dolor del cliente."
    severity: "MEDIUM"

  - id: "L04_DISC_CONSISTENCY"
    name: "Alineación Psicológica"
    instruction: "El script de venta debe coincidir con el perfil DISC detectado. No se puede hablar de forma agresiva a un perfil 'Estable' (S) ni con rodeos a un perfil 'Dominante' (D)."
    severity: "HIGH"

  - id: "L05_NO_HALLUCINATION_DATA"
    name: "Integridad de Entidades"
    instruction: "Si no se encuentran nombres de personas reales, no inventar perfiles. Es preferible reportar 'Sin Decisor Identificado' que crear un fantasma."
    severity: "CRITICAL"

  - id: "L06_NO_TECHNICAL_FLUFF"
    name: "Cero Metadatos Técnicos o Internos"
    instruction: "Está estrictamente PROHIBIDO incluir secciones sobre 'Razonamiento del Enjambre', 'Data Engineers', 'MiroFish', 'Readiness Score', 'Swarm' o cualquier metadato de depuración técnica en el entregable final. El dossier debe ser 100% comercial y limpio para el vendedor."
    severity: "CRITICAL"
