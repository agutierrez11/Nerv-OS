tarea_investigacion:
  description: >
    Investiga {empresa} en el mercado de México y LATAM. 
    1. Usa herramientas de búsqueda para encontrar noticias de 2024-2025.
    2. Identifica fricciones locales ESPECÍFICAS que {vendedor} pueda resolver con {producto}.
  expected_output: >
    Reporte forense detallado con links directos a fuentes originales.
  agent: investigador

tarea_psicologia:
  description: >
    Busca perfiles de LinkedIn para {empresa}. 
    Define el tipo DISC del decisor y cómo {vendedor} debe comunicarse con él.
  expected_output: >
    Reporte de Perfilado Psicológico del DECISOR con estructura DISC.
  agent: psicologo

tarea_simulacion_gemelo:
  description: >
    Actúa como el Gemelo Digital de {empresa}. 
    Sé escéptico. Pregunta: "¿Por qué {vendedor} es mejor que la competencia?" 
    o "¿Cómo garantiza {producto} que no fallará?"
  expected_output: >
    Simulación de objeciones de alto nivel.
  agent: gemelo_digital

tarea_dossier_final:
  description: >
    Consolida toda la inteligencia en un Dossier Forense.
    Estructura requerida:
    ---
    empresa: "{empresa}"
    vendedor: "{vendedor}"
    producto: "{producto}"
    ---
    ## 🎯 A QUIÉN HABLARLE
    * Muestra el decisor clave (LinkedIn, Nombre y Correo verificado u estimado).
    
    ## 💬 PLANTILLAS DE CORREO POR PERFIL PSICOLÓGICO (DISC)
    Si en la investigación se encontraron malas opiniones, comentarios negativos o fricciones operativas en Google Maps o reseñas de usuarios sobre pagos/comisiones/cobros de {empresa}, DEBES inyectar ese dolor real como gancho al inicio de los correos.
    
    Genera 3 variantes distintas de correo frío:
    *   **Variante D (Directores/CFOs Dominantes - Perfil D):** Menos de 100 palabras. Directo al grano. Enfocado en ROI, DSO, porcentaje de comisiones ahorradas y un enlace directo a Calendly. Cero formalidades excesivas.
    *   **Variante C (Analíticos/Ingeniería - Perfil C):** Enfoque técnico y racional. Detalles de integración API única, seguridad (3DS2 inteligente, reintentos en cascada, antifraude adaptativo) y enlaces de documentación. En el caso de Toku, destaca explícitamente sus certificaciones de seguridad (PCI DSS Level 1 e ISO 27001) para mitigar el riesgo de seguridad de datos.
    *   **Variante I/S (Relacionales/Operaciones - Perfiles I y S):** Enfoque relacional y de alivio operativo. Destacar cómo disminuye la carga manual del equipo contable/finanzas y da estabilidad/paz mental en la recaudación diaria.
    
    ## ⚔️ PLAN DE ATAQUE (Usando {producto})
    Diseña una secuencia de contacto multicanal adaptada. En el caso de Toku, integra activamente el enfoque consultivo en el plan (Fases de Diagnóstico, Acompañamiento integral sin cobro si no hay valor, y Definición conjunta de KPIs).
    
    ## ⚠️ MANEJO DE OBJECIONES (Simulado por el Gemelo Digital)
    Resuelve las objeciones principales. En el caso de Toku, utiliza argumentos de peso: el modelo "Consultoría + SaaS", el compromiso libre de riesgo "Aportar valor o no cobramos", el respaldo de Wollef Capital, y el cumplimiento de PCI DSS Level 1 e ISO 27001 para destruir cualquier objeción de desconfianza técnica o comercial.
  expected_output: >
    Dossier final en Markdown estructurado y accionable con las 3 variantes de email DISC personalizadas.
  agent: estratega

tarea_estructuracion_datos:
  description: >
    Toma el Dossier Final de {empresa} y extrae los datos clave:
    nombre, vertical, uvp, strategic_hook (para {producto}), pains, y killer_argument.
  expected_output: >
    Objeto JSON estructurado con la inteligencia de mercado.
  agent: ingeniero_datos
