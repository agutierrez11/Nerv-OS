tarea_investigacion:
  description: >
    Eres un analista de inteligencia de mercado de élite.
    Investiga a fondo {empresa} en el contexto de {pais} y LATAM.

    1. Busca noticias, reportes, entrevistas y movimientos recientes (2024-2025).
    2. Identifica sus retos, dolores operativos, presión competitiva y oportunidades de mejora
       que sean directamente relevantes para lo que ofrece {vendedor} con {producto}.
    3. Sintetiza con precisión. No repitas información genérica; busca señales débiles y datos concretos.
  expected_output: >
    Reporte de inteligencia forense con hallazgos específicos, fuentes verificables (URLs directos)
    y una sección de "fricciones clave" priorizadas por relevancia estratégica para la venta.
  agent: investigador

tarea_psicologia:
  description: >
    Eres un profiler de élite. Tu trabajo es construir el mapa psicológico del decisor real en {empresa}.

    1. Identifica al decisor o comité de decisión más probable para una compra de {producto}.
    2. Infiere su perfil DISC dominante a partir de señales: cargo, publicaciones, estilo de comunicación,
       trayectoria y sector.
    3. Define exactamente cómo debe comunicarse {vendedor} con este perfil:
       - Qué lenguaje usar (datos duros vs. relacional vs. técnico vs. visionario)
       - Qué evitar (presión prematura, exceso de detalles, informalidad, etc.)
       - Cuál es su motivación principal y su mayor miedo al tomar esta decisión.
  expected_output: >
    Ficha de Perfilado Psicológico del Decisor: perfil DISC con justificación, 
    mapa de motivaciones/miedos y protocolo de comunicación específico para {vendedor}.
  agent: psicologo

tarea_simulacion_gemelo:
  description: >
    Eres el Gemelo Digital del decisor de {empresa}. Tu misión es simular una conversación real
    con {vendedor}, adoptando el perfil psicológico (DISC) y el contexto operativo de la empresa.

    Reglas de la simulación:
    - Habla en primera persona como si fueras el decisor.
    - Expresa escepticismo genuino basado en los dolores reales de la empresa y tu perfil DISC.
    - No uses objeciones genéricas; ancla cada objeción en datos reales de la investigación.
    - Simula al menos 3 rondas de diálogo: objeción → respuesta de {vendedor} → contra-objeción o apertura.
    - El tono y vocabulario deben reflejar tu perfil DISC (ej: un perfil D será directo y agresivo;
      un perfil C pedirá evidencia técnica; un perfil S buscará garantías de soporte y estabilidad).

    Usa todo el contexto disponible (empresa, sector, perfil del decisor, propuesta de {vendedor})
    para hacer la simulación lo más realista y útil posible para preparar a {vendedor}.
  expected_output: >
    Transcripción de simulación de conversación (mínimo 3 intercambios) con el perfil DISC del decisor
    de {empresa}. Cada objeción debe estar anclada en evidencia real de la investigación.
  agent: gemelo_digital

tarea_dossier_final:
  description: >
    Eres un estratega de ventas consultivas de alto nivel. Consolida toda la inteligencia
    —investigación de mercado, perfil DISC del decisor y simulación de conversación—
    en un Dossier Estratégico de Prospección accionable.

    El dossier debe ser completamente adaptado a {empresa} y a su contexto real.
    Usa el contexto del vendedor ({vendedor} / {producto}) para construir argumentos
    relevantes, no para citar datos del vendor de forma literal o mecánica.

    Estructura requerida:
    ---
    empresa: "{empresa}"
    vendedor: "{vendedor}"
    producto: "{producto}"
    ---

    ## 🎯 A QUIÉN HABLARLE
    El decisor clave: nombre, cargo, perfil LinkedIn (si está disponible), correo estimado o verificado.
    Justifica brevemente por qué es el contacto correcto para esta venta.

    ## 🧠 MAPA ESTRATÉGICO
    - El dolor más crítico de {empresa} que {vendedor} puede resolver HOY.
    - El argumento de valor central adaptado a su contexto específico (no citar specs genéricas).
    - El momento de entrada ideal: ¿qué trigger reciente hace que sea el momento correcto para contactar?

    ## 💬 CORREOS DE PROSPECCIÓN (Adaptados al perfil DISC del decisor)
    Genera 3 variantes distintas. Cada una debe sonar como escrita por un humano para este prospecto
    específico. Usa el gancho correcto para el perfil DISC:
    - **Variante D (Perfil Dominante):** <100 palabras. Impacto directo en negocio, números concretos, CTA claro.
    - **Variante C (Perfil Analítico):** Lógica y evidencia. Menciona métricas, procesos, reducción de riesgo.
    - **Variante I/S (Perfil Relacional):** Empatía y alivio. Habla de equipo, tranquilidad operativa, confianza.

    Si la investigación detectó fricciones reales (reseñas negativas, noticias de problemas operativos
    en pagos/cobranza/comisiones), inyéctalas como gancho real al inicio del correo más relevante.

    ## ⚔️ PLAN DE CONTACTO MULTICANAL
    Secuencia de 5-7 toques adaptada al perfil DISC y al sector de {empresa}.
    Incluye canal, timing, mensaje clave y objetivo de cada toque.

    ## 🛡️ MANEJO DE OBJECIONES
    Basándote en la simulación del Gemelo Digital, prepara respuestas estratégicas a las 3 objeciones
    más probables. Cada respuesta debe usar los argumentos más relevantes del contexto del vendedor
    adaptados a los dolores reales de {empresa} —sin citar literalmente datos internos del vendor.

  expected_output: >
    Dossier Estratégico en Markdown, completamente personalizado para {empresa}.
    Accionable desde el primer día. Sin información genérica ni datos del vendor copy-pasteados.
  agent: estratega

tarea_estructuracion_datos:
  description: >
    Toma el Dossier Estratégico de {empresa} y extrae los datos clave en formato estructurado:
    nombre, vertical, uvp (propuesta de valor única adaptada al target), 
    strategic_hook (el gancho principal para {producto}), pains (top 3 dolores), 
    y killer_argument (el argumento más poderoso del dossier).
  expected_output: >
    Objeto JSON estructurado con la inteligencia de mercado extraída del dossier.
  agent: ingeniero_datos

